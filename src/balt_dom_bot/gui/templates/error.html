{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card border-warning">
      <div class="card-header bg-warning bg-opacity-25">
        <h4 class="mb-0">⚠️ {{ title or "Ошибка" }}</h4>
      </div>
      <div class="card-body">
        {% if message %}<p class="lead">{{ message }}</p>{% endif %}

        {% if problems %}
        <ul class="text-danger">
          {% for p in problems %}<li>{{ p }}</li>{% endfor %}
        </ul>
        {% endif %}

        <a href="{{ back_url or '/' }}" class="btn btn-secondary mt-3">← Назад</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
